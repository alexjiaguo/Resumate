<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder Suite</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 900px;
        }
        h1 { margin-bottom: 40px; color: #333; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .icon { font-size: 40px; margin-bottom: 15px; display: block; }
        .card h2 { margin: 0 0 10px 0; font-size: 20px; color: #2c3e50; }
        .card p { color: #666; font-size: 14px; line-height: 1.5; }
        .badge {
            background: #e1f0ff; color: #007bff; padding: 4px 8px;
            border-radius: 4px; font-size: 11px; font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Unified Resume Builder</h1>
        <div class="grid">
            <a href="Resume_Builder_v1.0.html" class="card">
                <span class="icon">📄</span>
                <h2>Template 1.0</h2>
                <p>Classic layout. Simple, clean, and reliable.<br><br><span class="badge">Standard</span></p>
            </a>
            <a href="Resume_Builder_v2.0.html" class="card">
                <span class="icon">💼</span>
                <h2>Template 2.0</h2>
                <p>Modern professional. Condensed typography for maximum content.<br><br><span class="badge">Compact</span></p>
            </a>
            <a href="Resume_Builder_v3.0.html" class="card">
                <span class="icon">🎨</span>
                <h2>Template 3.0</h2>
                <p>Sidebar layout with headshot support and rich customization.<br><br><span class="badge">Advanced</span></p>
            </a>
        </div>
    </div>
</body>
</html>
